<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo Grooves - Vinyl Record Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Echo Grooves</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li id="cart-btn-nav" class="hidden"><a href="#" class="nav-link">Cart</a></li>
                <li id="profile-btn-nav" class="hidden"><a href="#" class="nav-link">Profile</a></li>
            </ul>
        </nav>
        <div class="auth-buttons">
            <button id="login-btn-nav">Login</button>
            <button id="logout-btn-nav" class="hidden">Logout</button>
        </div>
    </header>

    <main>
        <section class="record-listings">
            <h2 class="section-title">Explore Our Vinyl Collection</h2>

            <div class="genre-filter">
                <button data-genre="All" class="active">All</button>
                <button data-genre="Rock">Rock</button>
                <button data-genre="Jazz">Jazz</button>
                <button data-genre="Hip-Hop">Hip-Hop</button>
                <button data-genre="Classical">Classical</button>
                <button data-genre="Pop">Pop</button>
            </div>

            <div class="record-grid" id="records-grid">
                <!-- Records will be loaded here by JavaScript -->
                <p>Loading records...</p>
            </div>
        </section>
    </main>

    <!-- Cart Modal -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>Your Shopping Cart</h2>
            <ul id="cart-items-list">
                <!-- Cart items will be loaded here by JavaScript -->
            </ul>
            <div id="cart-summary">
                <p>Total: <span id="cart-total">$0.00</span></p>
                <button id="purchase-button" disabled>Purchase Items</button>
                <p id="cart-message" class="hidden"></p>
            </div>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>User Profile</h2>
            <div class="profile-info">
                <p><strong><span id="profile-name"></span></strong></p>
                <p><span id="profile-email"></span></p>
            </div>

            <div class="order-history">
                <h3>Order History</h3>
                <div id="order-history-list">
                    <!-- Order history will be loaded here by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
