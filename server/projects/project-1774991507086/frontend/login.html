<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Echo Grooves</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav class="container">
            <a href="index.html" class="logo">Echo Grooves</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="profile.html">Profile</a></li>
            </ul>
            <div class="auth-buttons">
                <a href="login.html" class="button" id="loginButton">Login</a>
                <a href="signup.html" class="button" id="signupButton">Sign Up</a>
                <button id="logoutButton" class="hidden">Logout</button>
            </div>
        </nav>
    </header>

    <main>
        <section class="container">
            <div class="form-container">
                <h2>Login to Echo Grooves</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit">Login</button>
                    <div id="message" class="message hidden"></div>
                </form>
                <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2023 Echo Grooves. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
