<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo Grooves - Vinyl Records</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav class="container">
            <a href="index.html" class="logo">Echo Grooves</a>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="profile.html">Profile</a></li>
            </ul>
            <div class="auth-buttons">
                <a href="login.html" class="button" id="loginButton">Login</a>
                <a href="signup.html" class="button" id="signupButton">Sign Up</a>
                <button id="logoutButton" class="hidden">Logout</button>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Discover Your Next Groove</h1>
        </section>

        <section class="container">
            <h2 class="page-title">Our Vinyl Collection</h2>
            <nav class="genres-nav">
                <button class="genre-button active" data-genre="all">All Genres</button>
                <button class="genre-button" data-genre="Rock">Rock</button>
                <button class="genre-button" data-genre="Jazz">Jazz</button>
                <button class="genre-button" data-genre="Hip-Hop">Hip-Hop</button>
                <button class="genre-button" data-genre="Pop">Pop</button>
            </nav>
            <div id="recordList" class="record-list">
                <!-- Vinyl records will be loaded here by JavaScript -->
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2023 Echo Grooves. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
